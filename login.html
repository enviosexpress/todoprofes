<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoProfes - Iniciar Sesión</title>
    <link rel="icon" href="https://i.postimg.cc/tCd6mnpB/Imagen-de-Whats-App-2025-05-29-a-las-19-52-44-fe5c1d3f-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.292.0/dist/umd/lucide.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: #E2E8F0;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #3B82F6;
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3B82F6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- Fondo decorativo -->
    <div class="fixed inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 1s;"></div>
    </div>

    <div class="glass-effect rounded-2xl shadow-2xl max-w-md w-full p-8 relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">TodoProfes</h1>
            <p class="text-slate-400">Plataforma Inteligente para Educadores</p>
        </div>

        <div class="text-center mb-8">
            <div class="inline-block bg-gradient-to-r from-blue-500 to-purple-500 p-4 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" x2="3" y1="12" y2="12"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">¡Bienvenido de vuelta!</h2>
            <p class="text-slate-400 mt-1">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="loginForm" class="space-y-5" onsubmit="event.preventDefault(); handleLogin()">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <input type="email" id="email" class="input-field w-full p-3 pl-10" placeholder="tu@correo.com" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" 
                           id="password" 
                           class="input-field w-full p-3 pl-10 bg-slate-800/50 border border-slate-700 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="••••••••" 
                           autocomplete="new-password" 
                           required>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-300">
                    <input type="checkbox" class="form-checkbox h-4 w-4 text-blue-500 bg-slate-700 border-slate-600 rounded">
                    <span class="ml-2">Recordarme</span>
                </label>
                <a href="#" onclick="handleForgotPassword()" class="text-blue-400 hover:text-blue-300">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" id="loginBtn" class="btn-primary w-full text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center space-x-2">
                <span>Iniciar Sesión</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>

            <!-- Separador O -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-slate-800 text-slate-400">O continúa con</span>
                </div>
            </div>

            <!-- Botón de Google -->
            <button type="button" onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-slate-900 font-medium py-3 px-4 rounded-lg transition-all border border-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Iniciar sesión con Google</span>
            </button>

            <div id="message" class="text-center text-sm hidden"></div>
        </form>

        <div class="mt-6 text-center">
            <p class="text-slate-400">
                ¿No tienes una cuenta? 
                <a href="register.html" class="text-blue-400 hover:text-blue-300 font-semibold">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://zicowjlhaopgamhesqcz.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppY293amxoYW9wZ2FtaGVzcWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDI2MDYsImV4cCI6MjA4NjU3ODYwNn0.3r8kYbgjmEzj2zADZOHL3V0kH05_I8gi0hdVMu_odzA'

        // Función para mostrar mensajes
        function showMessage(text, isError = true) {
            const msgEl = document.getElementById('message')
            msgEl.textContent = text
            msgEl.className = `text-center text-sm mt-4 p-3 rounded-lg ${isError ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`
            msgEl.classList.remove('hidden')
            
            // Ocultar después de 3 segundos
            setTimeout(() => {
                msgEl.classList.add('hidden')
            }, 3000)
        }

        // Función para recuperar contraseña
        function handleForgotPassword() {
            window.location.href = 'recuperar-password.html';
        }

        // Función para login con Google
        function handleGoogleLogin() {
            // Construir URL de autorización de Supabase
            const redirectUrl = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${window.location.origin}/index.html`;
            
            // Mostrar mensaje de redirección
            showMessage('Redirigiendo a Google...', false);
            
            // Redirigir después de un breve momento
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500);
        }

        // Función para iniciar sesión con email/contraseña
        async function handleLogin() {
            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value
            const btn = document.getElementById('loginBtn')
            
            console.log('🔐 Intentando login para:', email)

            if (!email || !password) {
                showMessage('Por favor, completa todos los campos')
                return
            }

            // Validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            if (!emailRegex.test(email)) {
                showMessage('Por favor, ingresa un correo electrónico válido')
                return
            }

            // Mostrar loading
            const originalText = btn.innerHTML
            btn.innerHTML = '<span class="loader"></span><span class="ml-2">Iniciando sesión...</span>'
            btn.disabled = true

            try {
                // Intentar login con Supabase
                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                })

                const data = await response.json()

                if (response.ok && data.access_token) {
                    console.log('✅ Login exitoso, guardando datos...')
                    
                    // Guardar el token
                    localStorage.setItem('supabase_token', data.access_token)
                    localStorage.setItem('supabase_refresh_token', data.refresh_token)
                    
                    // Guardar datos básicos del usuario
                    localStorage.setItem('user_email', email)
                    localStorage.setItem('user_id', data.user.id)
                    
                    // Guardar nombre del usuario (si existe)
                    const userName = data.user.user_metadata?.full_name || email.split('@')[0]
                    localStorage.setItem('user_name', userName)
                    
                    console.log('💾 Datos guardados')

                    showMessage('¡Inicio de sesión exitoso! Redirigiendo...', false)
                    
                    // Verificar si hay una página pendiente
                    const intendedPage = localStorage.getItem('intendedPage')
                    
                    setTimeout(() => {
                        if (intendedPage && intendedPage !== 'login.html' && intendedPage !== 'register.html') {
                            localStorage.removeItem('intendedPage')
                            window.location.href = intendedPage
                        } else {
                            window.location.href = 'index.html'
                        }
                    }, 1500)
                    
                } else {
                    console.error('❌ Error en login:', data)
                    showMessage('Correo o contraseña incorrectos')
                    btn.innerHTML = originalText
                    btn.disabled = false
                }

            } catch (error) {
                console.error('❌ Error de conexión:', error)
                showMessage('Error de conexión. Por favor, intenta de nuevo.')
                btn.innerHTML = originalText
                btn.disabled = false
            }
        }

        // Verificar si ya hay sesión activa y redirigir
        function checkExistingSession() {
            const token = localStorage.getItem('supabase_token')
            console.log('🔍 Verificando sesión existente:', token ? '✅ Sí' : '❌ No')
            if (token) {
                window.location.href = 'index.html'
            }
        }

        // Ejecutar al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingSession()
            
            // Verificar si hay parámetros en la URL (para mensajes de éxito/error)
            const urlParams = new URLSearchParams(window.location.search)
            if (urlParams.get('registered') === 'true') {
                showMessage('✅ Registro exitoso. Por favor, inicia sesión.', false)
            } else if (urlParams.get('password_updated') === 'true') {
                showMessage('✅ Contraseña actualizada correctamente', false)
            } else if (urlParams.get('error') === 'auth') {
                showMessage('❌ Error de autenticación. Intenta de nuevo.')
            }
        })
        
        lucide.createIcons()
    </script>
</body>
</html>

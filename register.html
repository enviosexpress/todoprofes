<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoProfes - Crear Cuenta</title>
    <link rel="icon" href="https://i.postimg.cc/tCd6mnpB/Imagen-de-Whats-App-2025-05-29-a-las-19-52-44-fe5c1d3f-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: #E2E8F0;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            width: 100%;
            padding: 0.75rem;
        }
        .input-field:focus {
            border-color: #8B5CF6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
            transition: all 0.3s ease;
            width: 100%;
            color: white;
            font-weight: bold;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #8B5CF6;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #8B5CF6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-effect rounded-2xl shadow-2xl max-w-md w-full p-8 relative z-10">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-bold text-white mb-2">TodoProfes</h1>
            <p class="text-slate-400">Únete a nuestra comunidad educativa</p>
        </div>

        <div class="text-center mb-6">
            <div class="inline-block bg-gradient-to-r from-purple-500 to-pink-500 p-4 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="17" y1="11" x2="23" y2="11"></line>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Crear una cuenta</h2>
            <p class="text-slate-400 text-sm mt-1">Comienza a transformar tu enseñanza con IA</p>
        </div>

        <form id="registerForm" onsubmit="event.preventDefault(); handleRegister()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Nombre Completo</label>
                    <input type="text" id="fullName" class="input-field" placeholder="Ej: María González" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" class="input-field" placeholder="tu@correo.com" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
                    <input type="password" id="password" class="input-field" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Repite tu contraseña" required>
                </div>

                <div class="flex items-start">
                    <input type="checkbox" id="terms" class="mt-1 mr-2">
                    <label for="terms" class="text-sm text-slate-300">
                        Acepto los Términos y Condiciones
                    </label>
                </div>

                <button type="submit" id="registerBtn" class="btn-primary flex items-center justify-center space-x-2">
                    <span>Crear Cuenta Gratis</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <div id="message" class="text-center text-sm hidden p-3 rounded-lg"></div>
            </div>
        </form>

        <div class="mt-6 text-center">
            <p class="text-slate-400">
                ¿Ya tienes una cuenta? 
                <a href="login.html" class="text-purple-400 hover:text-purple-300 font-semibold">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zicowjlhaopgamhesqcz.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppY293amxoYW9wZ2FtaGVzcWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDI2MDYsImV4cCI6MjA4NjU3ODYwNn0.3r8kYbgjmEzj2zADZOHL3V0kH05_I8gi0hdVMu_odzA'

        function showMessage(text, isSuccess = false) {
            const msgEl = document.getElementById('message')
            msgEl.textContent = text
            msgEl.className = `text-center text-sm p-3 rounded-lg ${isSuccess ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`
            msgEl.classList.remove('hidden')
        }

        async function handleRegister() {
            const name = document.getElementById('fullName').value.trim()
            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value
            const confirm = document.getElementById('confirmPassword').value
            const terms = document.getElementById('terms').checked

            // Validaciones básicas
            if (!name || !email || !password || !confirm) {
                showMessage('Por favor, completa todos los campos')
                return
            }

            if (!terms) {
                showMessage('Debes aceptar los términos y condiciones')
                return
            }

            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres')
                return
            }

            if (password !== confirm) {
                showMessage('Las contraseñas no coinciden')
                return
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            if (!emailRegex.test(email)) {
                showMessage('Por favor, ingresa un correo electrónico válido')
                return
            }

            // Mostrar loading
            const btn = document.getElementById('registerBtn')
            const originalText = btn.innerHTML
            btn.innerHTML = '<span class="loader"></span><span class="ml-2">Creando cuenta...</span>'
            btn.disabled = true

            try {
                // 1. Registrar en Supabase Auth
                const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        data: {
                            full_name: name
                        }
                    })
                })

                const data = await response.json()

                if (response.ok) {
                    // 2. Si el registro es exitoso, iniciamos sesión automáticamente
                    const loginResponse = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_KEY
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password
                        })
                    })

                    const loginData = await loginResponse.json()

                    if (loginResponse.ok && loginData.access_token) {
                        // 3. Guardar sesión
                        localStorage.setItem('supabase_token', loginData.access_token)
                        localStorage.setItem('supabase_refresh_token', loginData.refresh_token)
                        localStorage.setItem('user_email', email)
                        localStorage.setItem('user_id', loginData.user.id)
                        localStorage.setItem('user_name', name)

                        showMessage('¡Registro exitoso! Redirigiendo...', true)
                        
                        setTimeout(() => {
                            window.location.href = 'index.html'
                        }, 1500)
                    } else {
                        // Si no puede iniciar sesión automáticamente, va al login
                        showMessage('Registro exitoso. Por favor, inicia sesión.', true)
                        setTimeout(() => {
                            window.location.href = 'login.html'
                        }, 1500)
                    }
                } else {
                    // Manejar errores
                    if (data.msg && data.msg.includes('already registered')) {
                        showMessage('Este correo ya está registrado. Por favor, inicia sesión.')
                    } else {
                        showMessage(data.msg || 'Error al crear la cuenta')
                    }
                    btn.innerHTML = originalText
                    btn.disabled = false
                }

            } catch (error) {
                console.error('Error:', error)
                showMessage('Error de conexión. Por favor, intenta de nuevo.')
                btn.innerHTML = originalText
                btn.disabled = false
            }
        }

        // Verificar si ya hay sesión
        if (localStorage.getItem('supabase_token')) {
            window.location.href = 'index.html'
        }
    </script>
</body>
</html>
